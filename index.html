/* ═══ FIRESTORE HELPERS ═══ */
const fsAdd   =(col,data)=>db.collection(col).add({...data,createdAt:Date.now()});
const fsUpdate=(col,id,data)=>db.collection(col).doc(id).update(data);
const fsDelete=(col,id)=>db.collection(col).doc(id).delete();

function useCol(col,orderField="createdAt"){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    const q=orderField?db.collection(col).orderBy(orderField,"desc"):db.collection(col);
    const unsub=q.onSnapshot(snap=>{setData(snap.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);},()=>setLoading(false));
    return unsub;
  },[col]);
  return [data,loading];
}

/* ═══ AUTO-HIDE NAV HOOK ═══ */
function useAutoHideNav(){
  const [show,setShow]=useState(true);
  const last=useRef(0);
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const onScroll=()=>{
      const cur=el.scrollTop;
      if(cur>last.current&&cur>60)setShow(false);
      else setShow(true);
      last.current=cur;
    };
    el.addEventListener('scroll',onScroll,{passive:true});
    return()=>el.removeEventListener('scroll',onScroll);
  },[]);
  return [show,ref];
}

  const pendingFees=fees.filter(f=>!f.paid).length;
  /* upcoming events (schedules with eventDate) */
  const upcoming=useMemo(()=>schedules.filter(s=>s.eventDate&&s.eventDate>=today).sort((a,b)=>a.eventDate.localeCompare(b.eventDate)).slice(0,3),[schedules,today]);
  return(
    <div style={{padding:"14px"}} className="fa">
      <SecHead title="DASHBOARD"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[{icon:"👥",val:students.length,label:"STUDENTS",col:C.red,t:"stu"},{icon:"🏷️",val:batches.length,label:"BATCHES",col:C.blue,t:"sched"},{icon:"✅",val:presentToday,label:"PRESENT TODAY",col:C.green,t:"stu"},{icon:"💸",val:pendingFees,label:"FEES PENDING",col:C.gold,t:"fin"}].map(s=>(
          <Card key={s.label} onClick={()=>setTab(s.t)} style={{padding:"14px 12px",cursor:"pointer"}}>
            <div style={{fontSize:22}}>{s.icon}</div>
            <div style={{fontSize:26,fontWeight:900,color:s.col,lineHeight:1,marginTop:4}}>{s.val}</div>
            <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:.6,marginTop:2}}>{s.label}</div>
          </Card>
        ))}
      </div>
      <SecHead title="QUICK ACTIONS"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[{icon:"➕",label:"Register Student",t:"stu"},{icon:"📅",label:"Add Session",t:"sched"},{icon:"📸",label:"Upload Media",t:"gallery"},{icon:"💰",label:"Manage Fees",t:"fin"}].map(q=>(
          <Card key={q.label} onClick={()=>setTab(q.t)} style={{padding:"14px 10px",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:26,marginBottom:6}}>{q.icon}</div>
            <div style={{fontSize:13,fontWeight:800}}>{q.label}</div>
          </Card>
        ))}
      </div>
      {upcoming.length>0&&<>
        <SecHead title="UPCOMING EVENTS"/>
        {upcoming.map(s=>(
          <Card key={s.id} style={{padding:"11px 13px",marginBottom:8,borderLeft:`3px solid ${C.gold}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{background:"#b8860b22",color:C.gold,borderRadius:8,padding:"5px 8px",fontSize:11,fontWeight:800,minWidth:64,textAlign:"center"}}>📆<br/>{fmtDate(s.eventDate)}</div>
              <div style={{flex:1}}><div style={{fontWeight:800,fontSize:14}}>{s.eventTitle||s.discipline}</div><div style={{color:C.muted,fontSize:12,marginTop:1}}>{s.batchName||"General"} · {s.time}</div></div>
            </div>
          </Card>
        ))}
      </>}
      <SecHead title="RECENT SESSIONS"/>
      {schedules.filter(s=>!s.eventDate).length===0?<div style={{color:C.muted,textAlign:"center",padding:"20px 0",fontSize:13}}>No sessions yet</div>:schedules.filter(s=>!s.eventDate).slice(0,5).map(s=>(
        <Card key={s.id} style={{padding:"11px 13px",marginBottom:8,borderLeft:`3px solid ${C.red}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{background:C.redG,color:C.red,borderRadius:8,padding:"5px 8px",fontSize:11,fontWeight:800,minWidth:64,textAlign:"center"}}>{s.time}</div>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:14}}>{DISC_ICON[s.discipline]||"🥋"} {s.discipline}</div><div style={{color:C.muted,fontSize:12,marginTop:1}}>{s.batchName||"General"} · {s.coach}</div></div>
            <span style={{fontSize:11,color:C.blue,fontWeight:700}}>👥{s.studentIds?.length||0}</span>
          </div>
        </Card>
      ))}
    </div>
  );
}

/* ── Admin Students ── */
function AStu({students,batches,attendance,showToast}){
  const [view,setView]=useState("list");
  const [selId,setSelId]=useState(null);
  const [attDate,setAttDate]=useState(todayStr());
  const [attBatch,setAttBatch]=useState("all");
  const [search,setSearch]=useState("");
  const [showBatch,setShowBatch]=useState(false);
  const [batchName,setBatchName]=useState("");
  const [uploading,setUploading]=useState(false);
  const photoRef=useRef();

  const blankF={name:"",age:"",phone:"",email:"",address:"",disciplines:[],belts:{},batchId:"",joinDate:todayStr(),notes:"",photoPreview:null,photoFile:null};
  const [form,setForm]=useState(blankF);

  const toggleDisc=d=>setForm(p=>{
    const has=p.disciplines.includes(d);
    const disciplines=has?p.disciplines.filter(x=>x!==d):[...p.disciplines,d];
    const belts={...p.belts};
    if(has)delete belts[d];else belts[d]=BELT[d][0];
    return{...p,disciplines,belts};
  });

  const uploadPhoto=async(file)=>{
    const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
    const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:"POST",body:fd});
    const d=await res.json();if(d.secure_url)return d.secure_url;throw new Error("Upload failed");
  };

  const handlePhotoSelect=e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>10*1024*1024){showToast("Max 10MB","error");return;}
    const r=new FileReader();r.onload=ev=>setForm(p=>({...p,photoPreview:ev.target.result,photoFile:f}));r.readAsDataURL(f);
  };

  const handlePhotoUpdate=async(e,studentId)=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>10*1024*1024){showToast("Max 10MB","error");return;}
    setUploading(true);showToast("Uploading photo…","info");
    try{const url=await uploadPhoto(f);await fsUpdate("students",studentId,{photo:url});showToast("Photo updated 📸");}
    catch{showToast("Upload failed","error");}
    setUploading(false);
  };

  const register=async()=>{
    if(!form.name.trim()){showToast("Name is required","error");return;}
    if(!form.age){showToast("Age is required","error");return;}
    if(!form.disciplines.length){showToast("Select at least one discipline","error");return;}
    setUploading(true);
    try{
      let photo=null;
      if(form.photoFile){showToast("Uploading photo…","info");photo=await uploadPhoto(form.photoFile);}
      await fsAdd("students",{name:form.name.trim(),age:parseInt(form.age),phone:form.phone,email:form.email,address:form.address,disciplines:form.disciplines,belts:form.belts,batchId:form.batchId,joinDate:form.joinDate,notes:form.notes,photo,achievements:[]});
      setForm(blankF);setView("list");showToast(`${form.name} registered! 🥋`);
    }catch(e){showToast("Error saving student","error");console.error(e);}
    setUploading(false);
  };

  const getAtt=(sid,date)=>attendance.find(a=>a.studentId===sid&&a.date===date);
  const toggleAtt=async(sid,date)=>{
    const ex=getAtt(sid,date);
    if(ex)await fsUpdate("attendance",ex.id,{present:!ex.present});
    else await fsAdd("attendance",{studentId:sid,date,present:true});
  };

  /* batch-filtered students for attendance */
  const attStudents=useMemo(()=>{
    if(attBatch==="all")return students;
    return students.filter(s=>s.batchId===attBatch);
  },[students,attBatch]);

  const filtered=useMemo(()=>students.filter(s=>(s.name||"").toLowerCase().includes(search.toLowerCase())),[students,search]);

  /* ── ADD FORM ── */
  if(view==="add") return(
    <div style={{padding:"14px",paddingBottom:10}} className="fa">
      <button onClick={()=>setView("list")} style={BST}>← Back</button>
      <SecHead title="REGISTER STUDENT"/>
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{position:"relative",display:"inline-block"}}>
          <Av name={form.name||"?"} photo={form.photoPreview} size={80}/>
          <button onClick={()=>photoRef.current.click()} style={{position:"absolute",bottom:0,right:0,width:26,height:26,borderRadius:"50%",background:C.red,color:"#fff",fontSize:12,border:`2px solid ${C.bg}`,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>📷</button>
        </div>
        <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoSelect}/>
        <div style={{color:C.muted,fontSize:11,marginTop:6}}>Tap 📷 to add profile photo</div>
      </div>
      <FInput label="Full Name *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Student full name"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FInput label="Age *" type="number" value={form.age} onChange={e=>setForm(p=>({...p,age:e.target.value}))} placeholder="Age"/>
        <FInput label="Join Date" type="date" value={form.joinDate} onChange={e=>setForm(p=>({...p,joinDate:e.target.value}))}/>
      </div>
      <FInput label="Phone Number" type="tel" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="Mobile number"/>
      <FInput label="Email" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="Email address"/>
      <FInput label="Address" type="textarea" rows={2} value={form.address} onChange={e=>setForm(p=>({...p,address:e.target.value}))} placeholder="Home address"/>
      <div style={{marginBottom:12}}>
        <Lbl>DISCIPLINES * (select multiple)</Lbl>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {DISCIPLINES.map(d=>{const on=form.disciplines.includes(d);return(
            <button key={d} onClick={()=>toggleDisc(d)} style={{padding:"10px 8px",borderRadius:12,fontWeight:800,fontSize:13,background:on?C.red:C.card2,color:on?"#fff":C.muted,border:`1px solid ${on?C.red:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {DISC_ICON[d]} {d}
            </button>
          );})}
        </div>
      </div>
      {form.disciplines.map(d=>(
        <div key={d} style={{marginBottom:12}}>
          <Lbl>{DISC_ICON[d]} {d} — BELT / LEVEL</Lbl>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {BELT[d].map(b=><button key={b} onClick={()=>setForm(p=>({...p,belts:{...p.belts,[d]:b}}))} style={{padding:"5px 11px",borderRadius:20,fontSize:12,fontWeight:800,background:form.belts[d]===b?C.red:C.card2,color:form.belts[d]===b?"#fff":C.muted,border:`1px solid ${form.belts[d]===b?C.red:C.border}`}}>{b}</button>)}
          </div>
        </div>
      ))}
      <div style={{marginBottom:12}}>
        <Lbl>ASSIGN TO BATCH</Lbl>
        <select value={form.batchId} onChange={e=>setForm(p=>({...p,batchId:e.target.value}))} style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}>
          <option value="">— No batch yet —</option>
          {batches.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
        </select>
      </div>
      <FInput label="Notes" type="textarea" rows={2} value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Coach observations…"/>
      <Btn full onClick={register} disabled={uploading} style={{animation:"pulse 2s infinite"}}>{uploading?"⟳ Saving…":"⚔️ REGISTER WARRIOR"}</Btn>
    </div>
  );

  /* ── ATTENDANCE — delegate to proper component (no hooks-in-conditional) ── */
  if(view==="att") return(
    <AttView
      students={students} batches={batches} attendance={attendance}
      attDate={attDate} setAttDate={setAttDate}
      attBatch={attBatch} setAttBatch={setAttBatch}
      attStudents={attStudents} getAtt={getAtt} toggleAtt={toggleAtt}
      onBack={()=>setView("list")} showToast={showToast}
    />
  );
  /* ── STUDENT DETAIL ── */
  if(view==="det"&&selId){
    const s=students.find(x=>x.id===selId);
    if(!s)return<div style={{padding:20,color:C.muted}}>Student not found.<button onClick={()=>setView("list")} style={BST}>← Back</button></div>;
    return<StuDetail s={s} batches={batches} attendance={attendance} showToast={showToast}
      onBack={()=>setView("list")}
      onDelete={async()=>{await fsDelete("students",s.id);setView("list");showToast("Student removed","info");}}
      onPhotoChange={handlePhotoUpdate} uploading={uploading}/>;
  }

  /* ── LIST ── */
  return(
    <div style={{padding:"14px"}} className="fa">
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <Btn onClick={()=>setView("add")} sm>➕ Register</Btn>
        <Btn onClick={()=>setView("att")} color={C.green} sm>✅ Attendance</Btn>
        <Btn onClick={()=>setShowBatch(true)} color={C.blue} sm>🏷️ Batches</Btn>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search students…"
        style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none",marginBottom:12}}/>
      <SecHead title={`STUDENTS (${students.length})`}/>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.muted}}><div style={{fontSize:42,marginBottom:10}}>👥</div>{students.length===0?"No students yet — tap Register":"No results"}</div>}
      {filtered.map(s=>{
        const batch=batches.find(b=>b.id===s.batchId);
        return(
          <Card key={s.id} onClick={()=>{setSelId(s.id);setView("det");}} style={{padding:"12px",marginBottom:9,cursor:"pointer",borderLeft:`3px solid ${C.red}`}}>
            <div style={{display:"flex",gap:11,alignItems:"center"}}>
              <Av name={s.name} photo={s.photo} size={46}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:900,fontSize:15}}>{s.name}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:2}}>Age {s.age} · {(s.disciplines||[]).map(d=>DISC_ICON[d]).join(" ")}</div>
                <div style={{marginTop:5,display:"flex",gap:5,flexWrap:"wrap"}}>{(s.disciplines||[]).map(d=><Pill key={d} label={s.belts?.[d]||""} small/>)}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:12,color:C.gold,fontWeight:800}}>🏆 {s.achievements?.length||0}</div>
                {batch&&<div style={{fontSize:10,color:C.blue,fontWeight:700,marginTop:3}}>{batch.name}</div>}
              </div>
            </div>
          </Card>
        );
      })}
      {showBatch&&(
        <div onClick={()=>setShowBatch(false)} style={{position:"fixed",inset:0,background:"#000c",zIndex:900,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:430,maxHeight:"70vh",overflowY:"auto"}}>
            <div style={{fontWeight:900,fontSize:17,letterSpacing:1,marginBottom:14}}>MANAGE BATCHES</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input value={batchName} onChange={e=>setBatchName(e.target.value)} placeholder="New batch name…"
                style={{flex:1,background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"9px 12px",fontSize:14,outline:"none"}}/>
              <Btn onClick={async()=>{if(!batchName.trim())return;await fsAdd("batches",{name:batchName.trim()});setBatchName("");showToast("Batch created");}} sm>Add</Btn>
            </div>
            {batches.length===0&&<div style={{color:C.muted,textAlign:"center",padding:"10px 0",fontSize:13}}>No batches yet</div>}
            {batches.map(b=>(
              <div key={b.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{flex:1,fontWeight:700}}>🏷️ {b.name}</div>
                <button onClick={async()=>{await fsDelete("batches",b.id);showToast("Batch removed","info");}} style={{background:"transparent",color:"#b01c1c",fontSize:16}}>🗑</button>
              </div>
            ))}
            <Btn full color={C.blue} onClick={()=>setShowBatch(false)} style={{marginTop:14}}>Close</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Student Detail ── */
function StuDetail({s,batches,attendance,showToast,onBack,onDelete,onPhotoChange,uploading}){
  const [edit,setEdit]=useState(false);
  const [form,setForm]=useState({name:s.name,age:s.age,phone:s.phone||"",email:s.email||"",address:s.address||"",notes:s.notes||"",disciplines:s.disciplines||[],belts:s.belts||{},batchId:s.batchId||""});
  const pRef=useRef();
  const batch=batches.find(b=>b.id===s.batchId);
  const sAtt=attendance.filter(a=>a.studentId===s.id).sort((a,b)=>b.date.localeCompare(a.date));
  const pct=sAtt.length?Math.round(sAtt.filter(a=>a.present).length/sAtt.length*100):0;

  const toggleDisc=d=>setForm(p=>{
    const has=p.disciplines.includes(d);
    const disciplines=has?p.disciplines.filter(x=>x!==d):[...p.disciplines,d];
    const belts={...p.belts};
    if(has)delete belts[d];else belts[d]=BELT[d][0];
    return{...p,disciplines,belts};
  });

  if(edit) return(
    <div style={{padding:14,paddingBottom:10}} className="fa">
      <button onClick={()=>setEdit(false)} style={BST}>← Cancel</button>
      <SecHead title="EDIT STUDENT"/>
      <FInput label="Name" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Full name"/>
      <FInput label="Age" type="number" value={form.age} onChange={e=>setForm(p=>({...p,age:e.target.value}))} placeholder="Age"/>
      <FInput label="Phone" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="Phone"/>
      <FInput label="Email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="Email"/>
      <FInput label="Address" type="textarea" rows={2} value={form.address} onChange={e=>setForm(p=>({...p,address:e.target.value}))} placeholder="Address"/>
      <FInput label="Notes" type="textarea" rows={2} value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Notes"/>
      <div style={{marginBottom:12}}>
        <Lbl>DISCIPLINES</Lbl>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {DISCIPLINES.map(d=>{const on=form.disciplines.includes(d);return(
            <button key={d} onClick={()=>toggleDisc(d)} style={{padding:"10px 8px",borderRadius:12,fontWeight:800,fontSize:13,background:on?C.red:C.card2,color:on?"#fff":C.muted,border:`1px solid ${on?C.red:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {DISC_ICON[d]} {d}
            </button>
          );})}
        </div>
      </div>
      {/* Belt grade editor */}
      {form.disciplines.map(d=>(
        <div key={d} style={{marginBottom:12}}>
          <Lbl>{DISC_ICON[d]} {d} — BELT GRADE</Lbl>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {BELT[d].map(b=><button key={b} onClick={()=>setForm(p=>({...p,belts:{...p.belts,[d]:b}}))} style={{padding:"5px 11px",borderRadius:20,fontSize:12,fontWeight:800,background:form.belts[d]===b?C.red:C.card2,color:form.belts[d]===b?"#fff":C.muted,border:`1px solid ${form.belts[d]===b?C.red:C.border}`}}>{b}</button>)}
          </div>
        </div>
      ))}
      <div style={{marginBottom:12}}>
        <Lbl>BATCH</Lbl>
        <select value={form.batchId} onChange={e=>setForm(p=>({...p,batchId:e.target.value}))} style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}>
          <option value="">— No batch —</option>
          {batches.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
        </select>
      </div>
      <Btn full onClick={async()=>{
        try{
          await fsUpdate("students",s.id,{name:form.name,age:Number(form.age),phone:form.phone,email:form.email,address:form.address,notes:form.notes,disciplines:form.disciplines,belts:form.belts,batchId:form.batchId});
          showToast("Student updated ✅");setEdit(false);
        }catch(e){console.error(e);showToast("Update failed ❌","error");}
      }}>💾 Save Changes</Btn>
    </div>
  );

  return(
    <div style={{paddingBottom:10}} className="fa">
      <div style={{background:"linear-gradient(180deg,#1e0404,#0c0c0c)",padding:"14px 14px 20px"}}>
        <button onClick={onBack} style={BST}>← Back</button>
        <div style={{display:"flex",gap:14,alignItems:"center",marginTop:10}}>
          <div style={{position:"relative"}}>
            <Av name={s.name} photo={s.photo} size={72}/>
            <button onClick={()=>pRef.current.click()} disabled={uploading}
              style={{position:"absolute",bottom:0,right:0,width:24,height:24,borderRadius:"50%",background:C.red,color:"#fff",fontSize:11,border:`2px solid ${C.bg}`,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
              {uploading?"⟳":"📷"}
            </button>
            <input ref={pRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>onPhotoChange(e,s.id)}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:22,fontWeight:900,lineHeight:1}}>{s.name}</div>
            <div style={{color:C.muted,fontSize:13,marginTop:3}}>Age {s.age} · Joined {fmtDate(s.joinDate)}</div>
            <div style={{marginTop:6,display:"flex",gap:5,flexWrap:"wrap"}}>{(s.disciplines||[]).map(d=><Pill key={d} label={`${DISC_ICON[d]} ${s.belts?.[d]||""}`} small/>)}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:14}}>
          {[{icon:"📊",val:`${pct}%`,label:"ATTENDANCE",col:C.green},{icon:"🏆",val:s.achievements?.length||0,label:"AWARDS",col:C.gold},{icon:"🏷️",val:batch?.name||"None",label:"BATCH",col:C.blue}].map(st=>(
            <Card key={st.label} style={{padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:18}}>{st.icon}</div>
              <div style={{fontSize:String(st.val).length>6?12:18,fontWeight:900,color:st.col,lineHeight:1,marginTop:2}}>{st.val}</div>
              <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:.4,marginTop:2}}>{st.label}</div>
            </Card>
          ))}
        </div>
      </div>
      <div style={{padding:"14px"}}>
        <Card style={{padding:13,marginBottom:14}}>
          <div style={{fontSize:10,color:C.muted,fontWeight:800,letterSpacing:1.5,marginBottom:8}}>CONTACT INFO</div>
          <div style={{fontSize:13,marginBottom:4}}>📱 {s.phone||"—"}</div>
          <div style={{fontSize:13,marginBottom:4}}>✉️ {s.email||"—"}</div>
          <div style={{fontSize:13}}>🏠 {s.address||"—"}</div>
          {s.notes&&<div style={{fontSize:12,color:C.muted,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:8}}>"{s.notes}"</div>}
        </Card>
        {/* Attendance history */}
        <SecHead title={`ATTENDANCE HISTORY (${sAtt.length})`}/>
        {sAtt.length>0&&(
          <div style={{background:C.card2,borderRadius:11,padding:"10px 13px",marginBottom:10}}>
            <span style={{fontWeight:800,color:C.green,fontSize:16}}>{pct}%</span>

          </div>
        )}
        {sAtt.length===0&&<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0"}}>No attendance records</div>}
        {sAtt.slice(0,50).map(a=>(
          <Card key={a.id} style={{padding:"8px 12px",marginBottom:5,display:"flex",alignItems:"center",gap:10}}>

        <SecHead title="ACHIEVEMENTS" style={{marginTop:14}}/>

        {(!s.achievements||s.achievements.length===0)&&<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0"}}>No achievements yet</div>}
        {(s.achievements||[]).map((a,i)=>(
          <Card key={i} style={{padding:"11px 13px",marginBottom:8,borderLeft:`3px solid ${C.red}`,display:"flex",gap:10}}>
            <div style={{fontSize:26}}>{a.badge}</div>
            <div><div style={{fontWeight:800,fontSize:14}}>{a.title}</div><div style={{color:C.muted,fontSize:11,marginTop:1}}>{fmtDate(a.date)}</div>{a.desc&&<div style={{fontSize:12,marginTop:4}}>{a.desc}</div>}</div>
          </Card>
        ))}
        <button onClick={()=>setEdit(true)} style={{width:"100%",background:"#031a0a",color:C.green,borderRadius:12,padding:11,fontWeight:800,fontSize:13,border:`1px solid ${C.green}44`,marginBottom:8,marginTop:8}}>✏️ Edit Student</button>
        <button onClick={onDelete} style={{width:"100%",background:"#1a0303",color:"#b01c1c",borderRadius:12,padding:11,fontWeight:800,fontSize:13,border:"1px solid #b01c1c44"}}>🗑 Remove Student</button>
      </div>
    </div>
  );
}

function AchForm({studentId,showToast,achievements}){
  const [open,setOpen]=useState(false);
  const [f,setF]=useState({title:"",date:todayStr(),badge:"🥇",desc:""});
  const save=async()=>{
    if(!f.title){showToast("Title required","error");return;}
    try{await fsUpdate("students",studentId,{achievements:[...achievements,{...f,id:uid()}]});setF({title:"",date:todayStr(),badge:"🥇",desc:""});setOpen(false);showToast("Achievement added 🏆");}
    catch{showToast("Error saving","error");}
  };
  if(!open)return<button onClick={()=>setOpen(true)} style={{width:"100%",background:"#1a0606",color:C.red,borderRadius:12,padding:"10px",fontWeight:800,fontSize:13,border:`1.5px dashed ${C.red}44`,marginBottom:10}}>+ Add Achievement</button>;
  return(
    <Card style={{padding:14,marginBottom:10,border:`1px solid ${C.red}33`}}>
      <FInput label="Title *" value={f.title} onChange={e=>setF(p=>({...p,title:e.target.value}))} placeholder="Award / achievement title"/>
      <FInput label="Date" type="date" value={f.date} onChange={e=>setF(p=>({...p,date:e.target.value}))}/>
      <FInput label="Description" type="textarea" rows={2} value={f.desc} onChange={e=>setF(p=>({...p,desc:e.target.value}))} placeholder="Details…"/>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {BADGES.map(b=><button key={b} onClick={()=>setF(p=>({...p,badge:b}))} style={{fontSize:20,background:f.badge===b?C.red+"44":"transparent",border:`2px solid ${f.badge===b?C.red:"transparent"}`,borderRadius:8,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center"}}>{b}</button>)}
      </div>
      <div style={{display:"flex",gap:8}}><Btn onClick={save} sm>Save</Btn><Btn onClick={()=>setOpen(false)} outline color={C.muted} sm>Cancel</Btn></div>
    </Card>
  );
}

/* ── Admin Schedule (with events + date) ── */
function ASched({schedules,students,batches,showToast}){
  const [schedType,setSchedType]=useState("session"); // "session" | "event"
  const blankSession={day:"Monday",time:"",discipline:"Silambam",coach:"",batchId:"",batchName:"",studentIds:[],notes:""};
  const blankEvent={eventDate:"",eventTitle:"",time:"",discipline:"Silambam",coach:"",batchId:"",batchName:"",studentIds:[],notes:""};
  const [form,setForm]=useState(blankSession);
  const [show,setShow]=useState(false);
  const [expand,setExpand]=useState(null);
  const today=todayStr();

  const add=async()=>{
    if(!form.time||(schedType==="session"&&!form.coach)||(schedType==="event"&&!form.eventTitle)){
      showToast(schedType==="event"?"Event title and time required":"Time and Coach required","error");return;
    }
    const bn=batches.find(b=>b.id===form.batchId)?.name||"General";
    try{
      await fsAdd("schedules",{...form,batchName:bn,type:schedType});
      setForm(schedType==="session"?blankSession:blankEvent);setShow(false);
      showToast(schedType==="event"?"Event added 📆":"Session added 📅");
    }catch{showToast("Error saving","error");}
  };

  const del=async(id)=>{try{await fsDelete("schedules",id);showToast("Removed","info");}catch{showToast("Error","error");}};

  const sessions=useMemo(()=>schedules.filter(s=>s.type!=="event"||!s.type),[schedules]);
  const events=useMemo(()=>schedules.filter(s=>s.type==="event"&&s.eventDate).sort((a,b)=>a.eventDate.localeCompare(b.eventDate)),[schedules]);
  const byDay=useMemo(()=>DAYS.reduce((acc,d)=>{const s=sessions.filter(x=>x.day===d);if(s.length)acc[d]=s;return acc;},{}),[sessions]);

  return(
    <div style={{padding:"14px"}} className="fa">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <SecHead title="SCHEDULE & EVENTS"/>
        <Btn onClick={()=>setShow(v=>!v)} outline={show} color={show?C.muted:C.red} sm>{show?"✕ Cancel":"+ Add"}</Btn>
      </div>
      {show&&(
        <Card style={{padding:14,marginBottom:14,border:`1px solid ${C.red}33`}}>
          {/* type selector */}
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            <button onClick={()=>{setSchedType("session");setForm(blankSession);}} style={{flex:1,padding:"8px",borderRadius:10,fontWeight:800,fontSize:13,background:schedType==="session"?C.red:C.card2,color:schedType==="session"?"#fff":C.muted,border:`1px solid ${schedType==="session"?C.red:C.border}`}}>📅 Weekly Session</button>
            <button onClick={()=>{setSchedType("event");setForm(blankEvent);}} style={{flex:1,padding:"8px",borderRadius:10,fontWeight:800,fontSize:13,background:schedType==="event"?C.gold:C.card2,color:schedType==="event"?"#000":C.muted,border:`1px solid ${schedType==="event"?C.gold:C.border}`}}>📆 Upcoming Event</button>
          </div>
          {schedType==="session"?(
            <>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{marginBottom:12}}>
                  <Lbl>DAY</Lbl>
                  <select value={form.day} onChange={e=>setForm(p=>({...p,day:e.target.value}))} style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}>
                    {DAYS.map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
                <FInput label="Time *" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))} placeholder="e.g. 6:00 AM"/>
              </div>
            </>
          ):(
            <>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <FInput label="Event Date *" type="date" value={form.eventDate||""} onChange={e=>setForm(p=>({...p,eventDate:e.target.value}))}/>
                <FInput label="Time *" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))} placeholder="e.g. 10:00 AM"/>
              </div>
              <FInput label="Event Title *" value={form.eventTitle||""} onChange={e=>setForm(p=>({...p,eventTitle:e.target.value}))} placeholder="e.g. State Championship"/>
            </>
          )}
          <Lbl>DISCIPLINE</Lbl>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {[...DISCIPLINES,"All Disciplines"].map(d=>(
              <button key={d} onClick={()=>setForm(p=>({...p,discipline:d}))} style={{padding:"5px 10px",borderRadius:20,fontSize:12,fontWeight:800,background:form.discipline===d?C.red:C.card2,color:form.discipline===d?"#fff":C.muted,border:`1px solid ${form.discipline===d?C.red:C.border}`}}>{DISC_ICON[d]||"🥋"} {d}</button>
            ))}
          </div>
          <FInput label={schedType==="session"?"Coach *":"Coach / Contact"} value={form.coach} onChange={e=>setForm(p=>({...p,coach:e.target.value}))} placeholder="Master / coach name"/>
          <div style={{marginBottom:12}}>
            <Lbl>BATCH</Lbl>
            <select value={form.batchId} onChange={e=>setForm(p=>({...p,batchId:e.target.value}))} style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}>
              <option value="">— General / No batch —</option>

              return(
                <button key={s.id} onClick={()=>setForm(p=>{const has=p.studentIds.includes(s.id);return{...p,studentIds:has?p.studentIds.filter(x=>x!==s.id):[...p.studentIds,s.id]};})}

                  <Av name={s.name} photo={s.photo} size={28}/>
                  <div style={{flex:1,textAlign:"left"}}><div style={{fontWeight:800,fontSize:13,color:C.white}}>{s.name}</div><div style={{fontSize:11,color:C.muted}}>{batches.find(b=>b.id===s.batchId)?.name||""}</div></div>
                  <span style={{fontSize:16,color:tagged?C.red:C.muted}}>{tagged?"✓":"○"}</span>
                </button>
              );
            })}
          </div>
          <FInput label="Notes (optional)" type="textarea" rows={2} value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Additional notes…"/>
          <Btn full onClick={add}>{schedType==="event"?"📆 Add Event":"✚ Add Session"}</Btn>
        </Card>
      )}

      {/* UPCOMING EVENTS */}
      {events.length>0&&(
        <>
          <div style={{fontSize:11,color:C.gold,fontWeight:800,letterSpacing:3,marginBottom:8}}>📆 UPCOMING EVENTS</div>
          {events.map(s=>(
            <div key={s.id}>
              <Card style={{padding:"11px 13px",marginBottom:4,borderLeft:`3px solid ${C.gold}`,cursor:"pointer",background:s.eventDate<today?"#1a1a10":"#161616"}} onClick={()=>setExpand(expand===s.id?null:s.id)}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{background:"#b8860b22",color:C.gold,borderRadius:8,padding:"5px 8px",fontSize:10,fontWeight:800,minWidth:70,textAlign:"center"}}>{fmtDate(s.eventDate)}<br/>{s.time}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:14}}>{s.eventTitle}</div>
                    <div style={{color:C.muted,fontSize:12,marginTop:1}}>{DISC_ICON[s.discipline]||"🥋"} {s.discipline} · {s.batchName||"General"}</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    {s.eventDate<today&&<span style={{fontSize:10,color:C.muted}}>Past</span>}
                    <button onClick={e=>{e.stopPropagation();del(s.id);}} style={{background:"#1a0303",color:"#b01c1c",width:30,height:30,borderRadius:8,fontSize:14,border:"1px solid #b01c1c44",display:"flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
                  </div>
                </div>
              </Card>
              {expand===s.id&&(
                <div style={{background:C.card2,borderRadius:"0 0 12px 12px",padding:"10px 13px",marginBottom:6,border:`1px solid ${C.border}`,borderTop:"none"}}>
                  {s.notes&&<div style={{fontSize:12,color:C.muted,fontStyle:"italic",marginBottom:8}}>📝 {s.notes}</div>}
                  <div style={{fontSize:10,color:C.muted,fontWeight:800,letterSpacing:1.2,marginBottom:8}}>STUDENTS IN EVENT</div>
                  {(!s.studentIds||s.studentIds.length===0)?<div style={{color:C.muted,fontSize:12}}>No students tagged</div>
                    :<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{s.studentIds.map(sid=>{const st=students.find(x=>x.id===sid);return st?<div key={sid} style={{display:"flex",alignItems:"center",gap:5,background:C.card,borderRadius:20,padding:"3px 10px 3px 5px",border:`1px solid ${C.border}`}}><Av name={st.name} photo={st.photo} size={20}/><span style={{fontSize:12,fontWeight:700}}>{st.name}</span></div>:null;})}</div>
                  }
                </div>
              )}

      {Object.keys(byDay).length===0&&events.length===0&&!show&&<div style={{textAlign:"center",padding:"40px 0",color:C.muted}}><div style={{fontSize:42,marginBottom:10}}>📅</div>No sessions or events yet</div>}
      {Object.keys(byDay).length>0&&<div style={{fontSize:11,color:C.red,fontWeight:800,letterSpacing:3,marginBottom:8,marginTop:events.length>0?14:0}}>⚔️ WEEKLY SESSIONS</div>}
      {Object.entries(byDay).map(([day,sess])=>(
        <div key={day} style={{marginBottom:18}}>
          <div style={{fontSize:11,color:C.red,fontWeight:800,letterSpacing:3,marginBottom:8}}>{day.toUpperCase()}</div>

                  <div style={{flex:1,minWidth:0}}><div style={{fontWeight:800,fontSize:14}}>{DISC_ICON[s.discipline]||"🥋"} {s.discipline}</div><div style={{color:C.muted,fontSize:12,marginTop:1}}>{s.batchName||"General"} · {s.coach}</div></div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    <span style={{fontSize:11,color:C.blue,fontWeight:700}}>👥{s.studentIds?.length||0}</span>
                    <button onClick={e=>{e.stopPropagation();del(s.id);}} style={{background:"#1a0303",color:"#b01c1c",width:30,height:30,borderRadius:8,fontSize:14,border:"1px solid #b01c1c44",display:"flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
                  </div>
                </div>
              </Card>
              {expand===s.id&&(
                <div style={{background:C.card2,borderRadius:"0 0 12px 12px",padding:"10px 13px",marginBottom:6,border:`1px solid ${C.border}`,borderTop:"none"}}>
                  {s.notes&&<div style={{fontSize:12,color:C.muted,fontStyle:"italic",marginBottom:8}}>📝 {s.notes}</div>}
                  <div style={{fontSize:10,color:C.muted,fontWeight:800,letterSpacing:1.2,marginBottom:8}}>STUDENTS IN SESSION</div>
                  {(!s.studentIds||s.studentIds.length===0)?<div style={{color:C.muted,fontSize:12}}>No students tagged</div>
                    :<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{s.studentIds.map(sid=>{const st=students.find(x=>x.id===sid);return st?<div key={sid} style={{display:"flex",alignItems:"center",gap:5,background:C.card,borderRadius:20,padding:"3px 10px 3px 5px",border:`1px solid ${C.border}`}}><Av name={st.name} photo={st.photo} size={20}/><span style={{fontSize:12,fontWeight:700}}>{st.name}</span></div>:null;})}</div>
                  }
                </div>
              )}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

/* ── Admin Gallery (images + videos) ── */
function AGallery({gallery,students,showToast}){
  const [show,setShow]=useState(false);
  const [mediaType,setMediaType]=useState("image"); // "image" | "video"
  const [f,setF]=useState({studentId:"",caption:"",date:todayStr(),src:null,thumb:null,isVideo:false,uploading:false});
  const [lb,setLb]=useState(null);
  const [filterType,setFilterType]=useState("all"); // "all" | "image" | "video"
  const fileRef=useRef();

  const onFile=async e=>{
    const file=e.target.files[0];if(!file)return;
    const isVid=file.type.startsWith("video/");
    const maxSize=isVid?100*1024*1024:20*1024*1024; // 100MB video, 20MB image
    if(file.size>maxSize){showToast(`Max ${isVid?"100MB for video":"20MB for image"}`,  "error");return;}
    setF(p=>({...p,uploading:true}));showToast("Uploading…","info");
    const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
    const endpoint=isVid?`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`:`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
    try{
      const res=await fetch(endpoint,{method:"POST",body:fd});
      const d=await res.json();
      if(d.secure_url){
        const thumb=isVid?(d.secure_url.replace("/upload/","/upload/so_0,w_400,f_jpg/").replace(/\.\w+$/,".jpg")):null;
        setF(p=>({...p,src:d.secure_url,thumb,isVideo:isVid,uploading:false}));
        showToast(isVid?"Video ready ✓":"Image ready ✓");
      }else{setF(p=>({...p,uploading:false}));showToast("Upload failed","error");}
    }catch{setF(p=>({...p,uploading:false}));showToast("Upload error","error");}
  };

  const upload=async()=>{
    if(!f.src){showToast("Select a file first","error");return;}
    const stu=students.find(s=>s.id===f.studentId);
    try{
      await fsAdd("gallery",{studentId:f.studentId,studentName:stu?.name||"Club",caption:f.caption||"Photo",date:f.date,src:f.src,thumb:f.thumb,isVideo:f.isVideo||false});
      setF({studentId:"",caption:"",date:todayStr(),src:null,thumb:null,isVideo:false,uploading:false});setShow(false);
      showToast(`${f.isVideo?"Video":"Photo"} added 📸`);
    }catch{showToast("Error saving","error");}
  };

  const deleteMedia=async id=>{try{await fsDelete("gallery",id);setLb(null);showToast("Deleted","info");}catch{showToast("Error","error");}};

  const visible=useMemo(()=>gallery.filter(g=>filterType==="all"||(filterType==="video"?g.isVideo:!g.isVideo)),[gallery,filterType]);

  return(
    <div style={{padding:"14px"}} className="fa">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <SecHead title={`GALLERY (${gallery.length})`}/>
        <Btn onClick={()=>setShow(v=>!v)} outline={show} color={show?C.muted:C.red} sm>{show?"✕ Cancel":"+ Upload"}</Btn>
      </div>
      {/* filter tabs */}
      <div style={{display:"flex",gap:4,marginBottom:14,background:C.card2,borderRadius:11,padding:3}}>
        {[{id:"all",label:`All (${gallery.length})`},{id:"image",label:`📸 Photos`},{id:"video",label:`🎥 Videos`}].map(t=>(
          <button key={t.id} onClick={()=>setFilterType(t.id)} style={{flex:1,padding:"7px 4px",borderRadius:8,fontSize:12,fontWeight:800,background:filterType===t.id?C.red:"transparent",color:filterType===t.id?"#fff":C.muted,border:"none"}}>{t.label}</button>
        ))}
      </div>

      {show&&(
        <Card style={{padding:14,marginBottom:14,border:`1px solid ${C.red}33`}}>
          {/* media type */}
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <button onClick={()=>{setMediaType("image");setF(p=>({...p,src:null,isVideo:false}));}} style={{flex:1,padding:"8px",borderRadius:10,fontWeight:800,fontSize:13,background:mediaType==="image"?C.red:C.card2,color:mediaType==="image"?"#fff":C.muted,border:`1px solid ${mediaType==="image"?C.red:C.border}`}}>📸 Image</button>
            <button onClick={()=>{setMediaType("video");setF(p=>({...p,src:null,isVideo:true}));}} style={{flex:1,padding:"8px",borderRadius:10,fontWeight:800,fontSize:13,background:mediaType==="video"?C.blue:C.card2,color:mediaType==="video"?"#fff":C.muted,border:`1px solid ${mediaType==="video"?C.blue:C.border}`}}>🎥 Video</button>
          </div>
          <div onClick={()=>!f.uploading&&fileRef.current.click()}
            style={{background:C.card2,border:`2px dashed ${f.src?C.red:C.border}`,borderRadius:13,height:150,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:f.uploading?"wait":"pointer",overflow:"hidden",marginBottom:12,position:"relative"}}>

/* ── Admin Finance — month-wise grouped, with edit ── */
function AFin({fees,students,showToast}){
  const [view,setView]=useState("list");   /* list | add */
  const [f,setF]=useState({studentId:"",amount:"",month:MONTHS[new Date().getMonth()],year:String(new Date().getFullYear()),note:""});
  const [editId,setEditId]=useState(null);
  const [editF,setEditF]=useState(null);
  const [filter,setFilter]=useState("all"); /* all | paid | pending */
  const [expandMonth,setExpandMonth]=useState(null); /* "Jan 2025" */

  const add=async()=>{
    if(!f.studentId||!f.amount){showToast("Student and Amount required","error");return;}
    try{
      await fsAdd("fees",{studentId:f.studentId,amount:parseFloat(f.amount),month:f.month,year:f.year,note:f.note||"",paid:false,paidDate:""});
      setF(p=>({...p,amount:"",studentId:"",note:""}));setView("list");showToast("Fee record added 💰");
    }catch{showToast("Error saving","error");}
  };

  const togglePaid=async(fe)=>{
    try{await fsUpdate("fees",fe.id,{paid:!fe.paid,paidDate:!fe.paid?todayStr():""});}
    catch{showToast("Error updating","error");}
  };

  const saveEdit=async()=>{
    if(!editF.amount){showToast("Amount required","error");return;}
    try{
      await fsUpdate("fees",editId,{amount:parseFloat(editF.amount),month:editF.month,year:editF.year,note:editF.note||""});
      setEditId(null);setEditF(null);showToast("Fee record updated ✅");
    }catch{showToast("Update failed","error");}
  };

  const collected=fees.filter(f=>f.paid).reduce((s,x)=>s+(x.amount||0),0);
  const pending=fees.filter(f=>!f.paid).reduce((s,x)=>s+(x.amount||0),0);

  /* Build month-wise groups, sorted newest first.
     monthKey = "Jan 2025", value = array of fee records for that month */
  const MONTH_ORDER=useMemo(()=>{
    const keys=[...new Set(fees.map(fe=>`${fe.month} ${fe.year}`))];
    return keys.sort((a,b)=>{
      const [mA,yA]=a.split(" ");const [mB,yB]=b.split(" ");
      if(yB!==yA)return parseInt(yB)-parseInt(yA);
      return MONTHS.indexOf(mB)-MONTHS.indexOf(mA);
    });
  },[fees]);

  const feesByMonth=useMemo(()=>{
    const m={};
    MONTH_ORDER.forEach(k=>{
      m[k]=fees.filter(fe=>`${fe.month} ${fe.year}`===k&&(filter==="all"||(filter==="paid"?fe.paid:!fe.paid)));
    });
    return m;
  },[fees,MONTH_ORDER,filter]);

  /* edit modal */
  if(editId&&editF) return(
    <div style={{padding:"14px"}} className="fa">
      <button onClick={()=>{setEditId(null);setEditF(null);}} style={BST}>← Cancel</button>
      <SecHead title="EDIT FEE RECORD"/>
      <FInput label="Amount (₹) *" type="number" value={editF.amount} onChange={e=>setEditF(p=>({...p,amount:e.target.value}))} placeholder="Amount"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{marginBottom:12}}>
          <Lbl>MONTH</Lbl>
          <select value={editF.month} onChange={e=>setEditF(p=>({...p,month:e.target.value}))} style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}>
            {MONTHS.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <FInput label="Year" type="number" value={editF.year} onChange={e=>setEditF(p=>({...p,year:e.target.value}))} placeholder="2025"/>
      </div>
      <FInput label="Note (optional)" value={editF.note||""} onChange={e=>setEditF(p=>({...p,note:e.target.value}))} placeholder="e.g. Partial payment"/>
      <Btn full onClick={saveEdit}>💾 Save Changes</Btn>
    </div>
  );

  if(view==="add") return(
    <div style={{padding:"14px"}} className="fa">
      <button onClick={()=>setView("list")} style={BST}>← Back</button>
      <SecHead title="ADD FEE RECORD"/>
      <div style={{marginBottom:12}}>
        <Lbl>STUDENT *</Lbl>
        <select value={f.studentId} onChange={e=>setF(p=>({...p,studentId:e.target.value}))} style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}>
          <option value="">Select student…</option>
          {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
      </div>
      <FInput label="Amount (₹) *" type="number" value={f.amount} onChange={e=>setF(p=>({...p,amount:e.target.value}))} placeholder="e.g. 500"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{marginBottom:12}}>
          <Lbl>MONTH</Lbl>
          <select value={f.month} onChange={e=>setF(p=>({...p,month:e.target.value}))} style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}>
            {MONTHS.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <FInput label="Year" type="number" value={f.year} onChange={e=>setF(p=>({...p,year:e.target.value}))} placeholder="2025"/>
      </div>
      <FInput label="Note (optional)" value={f.note} onChange={e=>setF(p=>({...p,note:e.target.value}))} placeholder="e.g. First month"/>
      <Btn full onClick={add}>💰 Add Fee Record</Btn>
    </div>
  );

  return(
    <div style={{padding:"14px"}} className="fa">
      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[{label:"TOTAL",val:`₹${fees.reduce((s,x)=>s+(x.amount||0),0)}`,col:C.white},{label:"COLLECTED",val:`₹${collected}`,col:C.green},{label:"PENDING",val:`₹${pending}`,col:C.red}].map(s=>(
          <Card key={s.label} style={{padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:17,fontWeight:900,color:s.col}}>{s.val}</div>
            <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:.4,marginTop:3}}>{s.label}</div>
          </Card>
        ))}
      </div>

      {/* Status filter */}
      <div style={{display:"flex",gap:4,marginBottom:14,background:C.card2,borderRadius:11,padding:3}}>
        {["all","paid","pending"].map(flt=><button key={flt} onClick={()=>setFilter(flt)} style={{flex:1,padding:"7px 0",borderRadius:8,fontSize:12,fontWeight:800,background:filter===flt?C.red:"transparent",color:filter===flt?"#fff":C.muted,border:"none",textTransform:"capitalize"}}>{flt}</button>)}
      </div>

      {/* Add button */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:900,color:C.muted,letterSpacing:.5}}>MONTH-WISE RECORDS</div>
        <Btn onClick={()=>setView("add")} sm>+ Add</Btn>
      </div>

      {MONTH_ORDER.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:C.muted}}><div style={{fontSize:36,marginBottom:8}}>💰</div>No fee records yet</div>}

      {/* Month accordion */}
      {MONTH_ORDER.map(mk=>{
        const recs=feesByMonth[mk]||[];
        if(recs.length===0&&filter!=="all")return null; /* hide empty months when filtered */
        const allFeesFull=fees.filter(fe=>`${fe.month} ${fe.year}`===mk);
        const mCollected=allFeesFull.filter(fe=>fe.paid).reduce((s,x)=>s+(x.amount||0),0);
        const mPending=allFeesFull.filter(fe=>!fe.paid).reduce((s,x)=>s+(x.amount||0),0);
        const mTotal=allFeesFull.length;
        const mPaid=allFeesFull.filter(fe=>fe.paid).length;
        const isOpen=expandMonth===mk;

        return(
          <div key={mk} style={{marginBottom:8}}>
            {/* Month header — always visible, tap to expand */}
            <button onClick={()=>setExpandMonth(isOpen?null:mk)}
              style={{width:"100%",background:isOpen?`${C.blue}18`:C.card,border:`1px solid ${isOpen?C.blue:C.border}`,borderRadius:isOpen?"12px 12px 0 0":12,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:900,fontSize:15,color:C.white}}>{mk}</div>
                <div style={{display:"flex",gap:10,marginTop:4}}>
                  <span style={{fontSize:11,color:C.green,fontWeight:700}}>✓ ₹{mCollected}</span>
                  <span style={{fontSize:11,color:C.red,fontWeight:700}}>✗ ₹{mPending}</span>
                  <span style={{fontSize:11,color:C.muted}}>{mPaid}/{mTotal} paid</span>
                </div>
              </div>
              {/* Progress bar */}
              <div style={{width:50,textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:900,color:mPaid===mTotal&&mTotal>0?C.green:C.muted}}>{mTotal>0?Math.round(mPaid/mTotal*100):0}%</div>
                <div style={{width:50,height:4,background:"#222",borderRadius:2,marginTop:4,overflow:"hidden"}}>
                  <div style={{width:`${mTotal>0?Math.round(mPaid/mTotal*100):0}%`,height:"100%",background:mPaid===mTotal&&mTotal>0?C.green:C.gold,borderRadius:2}}/>
                </div>
              </div>
              <div style={{color:C.muted,fontSize:14,flexShrink:0}}>{isOpen?"▲":"▼"}</div>
            </button>

            {/* Expanded: student rows for this month */}
            {isOpen&&(
              <div style={{background:C.card2,border:`1px solid ${C.blue}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"10px 12px"}}>
                {recs.length===0&&<div style={{color:C.muted,textAlign:"center",padding:"10px 0",fontSize:12}}>No {filter} records for this month</div>}
                {recs.map(fe=>{
                  const stu=students.find(s=>s.id===fe.studentId);
                  return(
                    <div key={fe.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
                      <Av name={stu?.name||"?"} photo={stu?.photo} size={36}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:13}}>{stu?.name||"Unknown"}</div>
                        {fe.note&&<div style={{fontSize:11,color:C.blue}}>📝 {fe.note}</div>}
                        {fe.paid&&fe.paidDate&&<div style={{fontSize:10,color:C.green}}>Paid {fmtDate(fe.paidDate)}</div>}
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:15,fontWeight:900,color:fe.paid?C.green:C.red}}>₹{fe.amount}</div>
                        <div style={{display:"flex",gap:4,marginTop:4,justifyContent:"flex-end"}}>
                          <button onClick={()=>{setEditId(fe.id);setEditF({amount:fe.amount,month:fe.month,year:fe.year,note:fe.note||""});}}
                            style={{padding:"3px 8px",borderRadius:7,fontSize:11,fontWeight:800,background:"#031a0a",color:C.green,border:`1px solid ${C.green}44`}}>✏️</button>
                          <button onClick={()=>togglePaid(fe)}
                            style={{padding:"3px 8px",borderRadius:7,fontSize:11,fontWeight:800,background:fe.paid?"#0d2e1a":"#1a0404",color:fe.paid?C.green:C.red,border:`1px solid ${fe.paid?C.green:C.red}44`}}>
                            {fe.paid?"✓":"Pay"}
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

    </div>
  );
}

        {TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setSelStu(null);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"transparent",padding:"4px 8px",color:tab===t.id?C.red:C.muted}}><span style={{fontSize:20}}>{t.icon}</span><span style={{fontSize:9,fontWeight:800,letterSpacing:.4}}>{t.label}</span></button>)}

}

function PHome({students,schedules,attendance,fees,setTab}){
  const today=todayStr();
  const presentToday=attendance.filter(a=>a.date===today&&a.present).length;
  const pendingFees=fees.filter(f=>!f.paid).length;
  const upcoming=useMemo(()=>schedules.filter(s=>s.type==="event"&&s.eventDate&&s.eventDate>=today).sort((a,b)=>a.eventDate.localeCompare(b.eventDate)).slice(0,2),[schedules,today]);
  return(
    <div style={{padding:"14px"}} className="fa">
      <SecHead title="WELCOME"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[{icon:"👥",val:students.length,label:"STUDENTS",col:C.red,t:"stu"},{icon:"📅",val:schedules.filter(s=>s.type!=="event"||!s.type).length,label:"SESSIONS",col:C.blue,t:"sched"},{icon:"✅",val:presentToday,label:"PRESENT TODAY",col:C.green,t:"stu"},{icon:"💸",val:pendingFees,label:"FEES DUE",col:C.gold,t:"stu"}].map(s=>(
          <Card key={s.label} onClick={()=>setTab(s.t)} style={{padding:"14px 12px",cursor:"pointer"}}>
            <div style={{fontSize:22}}>{s.icon}</div>
            <div style={{fontSize:26,fontWeight:900,color:s.col,lineHeight:1,marginTop:4}}>{s.val}</div>
            <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:.6,marginTop:2}}>{s.label}</div>
          </Card>
        ))}
      </div>
      {upcoming.length>0&&<>
        <SecHead title="UPCOMING EVENTS"/>
        {upcoming.map(s=>(
          <Card key={s.id} style={{padding:"11px 13px",marginBottom:8,borderLeft:`3px solid ${C.gold}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{background:"#b8860b22",color:C.gold,borderRadius:8,padding:"5px 8px",fontSize:10,fontWeight:800,minWidth:70,textAlign:"center"}}>{fmtDate(s.eventDate)}<br/>{s.time}</div>
              <div style={{flex:1}}><div style={{fontWeight:800,fontSize:14}}>{s.eventTitle}</div><div style={{color:C.muted,fontSize:12,marginTop:1}}>{s.batchName||"General"}</div></div>
            </div>
          </Card>
        ))}
      </>}
      <SecHead title="TODAY'S SESSIONS"/>
      {schedules.filter(s=>s.type!=="event"||!s.type).slice(0,4).map(s=>(
        <Card key={s.id} style={{padding:"11px 13px",marginBottom:8,borderLeft:`3px solid ${C.red}`}}>

/* ═══ ATTENDANCE VIEW COMPONENT (proper component — hooks safe) ═══ */
function AttView({students,batches,attendance,attDate,setAttDate,attBatch,setAttBatch,attStudents,getAtt,toggleAtt,onBack,showToast}){
  const [attMode,setAttMode]=useState("mark");
  const [histBatch,setHistBatch]=useState("all");
  const [histDate,setHistDate]=useState(todayStr());

  const allDates=useMemo(()=>{
    const s=new Set(attendance.map(a=>a.date));
    return[...s].sort((a,b)=>b.localeCompare(a));
  },[attendance]);

  const histStudents=useMemo(()=>
    histBatch==="all"?students:students.filter(s=>s.batchId===histBatch)
  ,[students,histBatch]);

  const daySummary=useMemo(()=>allDates.map(date=>{
    const recs=attendance.filter(a=>a.date===date);
    const batchMap={};let totalPresent=0,totalStudents=0;
    students.forEach(s=>{
      const bName=batches.find(b=>b.id===s.batchId)?.name||"No Batch";
      if(!batchMap[bName])batchMap[bName]={present:0,total:0};
      batchMap[bName].total++;totalStudents++;
      if(recs.find(r=>r.studentId===s.id)?.present){batchMap[bName].present++;totalPresent++;}
    });
    return{date,totalPresent,totalStudents,batchMap};
  }),[allDates,attendance,students,batches]);

  const renderStudentRow=(s,date,toggle)=>{
    const rec=getAtt(s.id,date);const present=rec?.present||false;
    return(
      <Card key={s.id} style={{padding:"10px 13px",marginBottom:6,borderLeft:`3px solid ${present?C.green:C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <Av name={s.name} photo={s.photo} size={38}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:800,fontSize:14}}>{s.name}</div>
            <div style={{color:C.muted,fontSize:11,marginTop:1}}>{(s.disciplines||[]).map(d=>DISC_ICON[d]).join(" ")}</div>
          </div>
          {toggle
            ?<button onClick={()=>toggleAtt(s.id,date)} style={{width:42,height:42,borderRadius:11,fontWeight:900,fontSize:18,background:present?"#0d2e1a":"#1a1a1a",color:present?C.green:C.muted,border:`1.5px solid ${present?C.green:C.border}`}}>{present?"✓":"○"}</button>
            :<Pill label={present?"Present":"Absent"} color={present?C.green:C.red} small/>
          }
        </div>
      </Card>
    );
  };

  const renderBatchGroups=(studentsToShow,date,toggle)=>{
    if(batches.length===0) return studentsToShow.map(s=>renderStudentRow(s,date,toggle));
    const groups=[{id:"__none",name:"No Batch",students:studentsToShow.filter(s=>!s.batchId||s.batchId==="")},
      ...batches.map(b=>({id:b.id,name:b.name,students:studentsToShow.filter(s=>s.batchId===b.id)}))
    ].filter(g=>g.students.length>0);
    return groups.map(g=>{
      const pres=g.students.filter(s=>getAtt(s.id,date)?.present).length;
      return(
        <div key={g.id} style={{marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:900,color:C.blue,letterSpacing:1}}>🏷️ {g.name.toUpperCase()}</span>
            <span style={{fontSize:11,color:C.muted}}>{pres}/{g.students.length} present</span>
          </div>
          {g.students.map(s=>renderStudentRow(s,date,toggle))}
        </div>
      );
    });
  };

  return(
    <div style={{padding:"14px",paddingBottom:10}} className="fa">
      <button onClick={onBack} style={BST}>← Back</button>
      {/* Mode toggle */}
      <div style={{display:"flex",gap:4,marginBottom:16,background:C.card2,borderRadius:12,padding:3}}>
        <button onClick={()=>setAttMode("mark")} style={{flex:1,padding:"9px",borderRadius:9,fontSize:13,fontWeight:800,background:attMode==="mark"?C.green:"transparent",color:attMode==="mark"?"#fff":C.muted,border:"none"}}>✅ Mark Attendance</button>
        <button onClick={()=>setAttMode("history")} style={{flex:1,padding:"9px",borderRadius:9,fontSize:13,fontWeight:800,background:attMode==="history"?C.blue:"transparent",color:attMode==="history"?"#fff":C.muted,border:"none"}}>📋 View History</button>
      </div>

      {/* ── MARK MODE ── */}
      {attMode==="mark"&&<>
        <FInput label="Date" type="date" value={attDate} onChange={e=>setAttDate(e.target.value)}/>
        <div style={{marginBottom:12}}>
          <Lbl>FILTER BY BATCH</Lbl>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button onClick={()=>setAttBatch("all")} style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:800,background:attBatch==="all"?C.red:C.card2,color:attBatch==="all"?"#fff":C.muted,border:`1px solid ${attBatch==="all"?C.red:C.border}`}}>All</button>
            {batches.map(b=><button key={b.id} onClick={()=>setAttBatch(b.id)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:800,background:attBatch===b.id?C.red:C.card2,color:attBatch===b.id?"#fff":C.muted,border:`1px solid ${attBatch===b.id?C.red:C.border}`}}>{b.name}</button>)}
          </div>
        </div>
        {attStudents.length>0&&(()=>{
          const pres=attStudents.filter(s=>getAtt(s.id,attDate)?.present).length;
          return<div style={{background:C.card2,borderRadius:11,padding:"10px 13px",marginBottom:12,display:"flex",gap:16,alignItems:"center"}}>
            <span style={{fontWeight:800,color:C.green,fontSize:15}}>✅ {pres} Present</span>
            <span style={{fontWeight:800,color:C.red,fontSize:15}}>❌ {attStudents.length-pres} Absent</span>
            <span style={{color:C.muted,fontSize:12,marginLeft:"auto"}}>{attStudents.length} total</span>
          </div>;
        })()}
        {attStudents.length===0&&<div style={{color:C.muted,textAlign:"center",padding:30}}>No students{attBatch!=="all"?" in this batch":""}</div>}
        {attBatch==="all"
          ?renderBatchGroups(students,attDate,true)
          :attStudents.map(s=>renderStudentRow(s,attDate,true))
        }
        <Btn full color={C.green} onClick={()=>{showToast("Attendance saved ✓");onBack();}}>✅ Done</Btn>
      </>}

      {/* ── HISTORY MODE ── */}
      {attMode==="history"&&<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <Lbl>SELECT DATE</Lbl>
            <input type="date" value={histDate} onChange={e=>setHistDate(e.target.value)}
              style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}/>
          </div>
          <div>
            <Lbl>BATCH</Lbl>
            <select value={histBatch} onChange={e=>setHistBatch(e.target.value)}
              style={{background:C.card2,color:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:"10px 13px",width:"100%",fontSize:14,outline:"none"}}>
              <option value="all">All Batches</option>
              {batches.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
            </select>
          </div>
        </div>

        {/* Detail for selected date */}
        {histStudents.length>0&&(()=>{
          const recs=attendance.filter(a=>a.date===histDate);
          const pres=histStudents.filter(s=>recs.find(r=>r.studentId===s.id)?.present).length;
          return<>
            <div style={{background:C.card2,borderRadius:11,padding:"10px 14px",marginBottom:12,display:"flex",gap:16,alignItems:"center"}}>
              <span style={{fontWeight:800,color:C.green,fontSize:15}}>✅ {pres} Present</span>
              <span style={{fontWeight:800,color:C.red,fontSize:15}}>❌ {histStudents.length-pres} Absent</span>
              <span style={{color:C.muted,fontSize:12,marginLeft:"auto"}}>{fmtDate(histDate)}</span>
            </div>
            {/* batch-wise split for selected date */}
            {(()=>{
              const groups=histBatch==="all"
                ?[{id:"__none",name:"No Batch",students:histStudents.filter(s=>!s.batchId||s.batchId==="")},
                   ...batches.map(b=>({id:b.id,name:b.name,students:histStudents.filter(s=>s.batchId===b.id)}))
                  ].filter(g=>g.students.length>0)
                :[{id:"sel",name:batches.find(b=>b.id===histBatch)?.name||"Batch",students:histStudents}];
              return groups.map(g=>{
                const gPres=g.students.filter(s=>recs.find(r=>r.studentId===s.id)?.present).length;
                return<div key={g.id} style={{marginBottom:14}}>
                  {histBatch==="all"&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:900,color:C.blue,letterSpacing:1}}>🏷️ {g.name.toUpperCase()}</span>
                    <div style={{display:"flex",gap:8}}><span style={{fontSize:11,color:C.green,fontWeight:700}}>✅ {gPres}</span><span style={{fontSize:11,color:C.red,fontWeight:700}}>❌ {g.students.length-gPres}</span></div>
                  </div>}
                  {g.students.map(s=>{
                    const rec=recs.find(r=>r.studentId===s.id);
                    const present=rec?.present||false;const hasRec=!!rec;
                    return<Card key={s.id} style={{padding:"9px 12px",marginBottom:5,borderLeft:`3px solid ${present?C.green:hasRec?C.red:"#333"}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <Av name={s.name} photo={s.photo} size={36}/>
                        <div style={{flex:1,minWidth:0}}><div style={{fontWeight:800,fontSize:13}}>{s.name}</div><div style={{color:C.muted,fontSize:11}}>{(s.disciplines||[]).map(d=>DISC_ICON[d]).join(" ")}</div></div>
                        <Pill label={present?"Present":hasRec?"Absent":"—"} color={present?C.green:hasRec?C.red:C.muted} small/>
                      </div>
                    </Card>;
                  })}
                </div>;
              });
            })()}
          </>;
        })()}
        {histStudents.length===0&&<div style={{color:C.muted,textAlign:"center",padding:"20px 0"}}>No students found</div>}

        {/* All recorded dates list */}
        {allDates.length>0&&<>
          <div style={{marginTop:16,marginBottom:10,fontSize:11,fontWeight:900,color:C.muted,letterSpacing:1.5}}>ALL RECORDED DATES</div>
          {daySummary
            .filter(ds=>histBatch==="all"||students.filter(s=>s.batchId===histBatch).some(s=>attendance.find(a=>a.date===ds.date&&a.studentId===s.id)))
            .map(ds=>{
              const isSelected=ds.date===histDate;
              const pct=ds.totalStudents?Math.round(ds.totalPresent/ds.totalStudents*100):0;
              return(
                <button key={ds.date} onClick={()=>setHistDate(ds.date)}
                  style={{width:"100%",background:isSelected?C.blue+"22":C.card,border:`1px solid ${isSelected?C.blue:C.border}`,borderLeft:`3px solid ${pct>=75?C.green:pct>=50?"#b8860b":C.red}`,borderRadius:11,padding:"10px 13px",marginBottom:6,display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:13,color:C.white}}>{fmtDate(ds.date)}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:5}}>
                      {Object.entries(ds.batchMap).map(([bn,bv])=>(
                        <span key={bn} style={{fontSize:10,background:C.card2,color:C.muted,borderRadius:6,padding:"2px 7px",fontWeight:700}}>{bn}: {bv.present}/{bv.total}</span>
                      ))}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:16,fontWeight:900,color:pct>=75?C.green:pct>=50?"#b8860b":C.red}}>{pct}%</div>
                    <div style={{fontSize:10,color:C.muted}}>{ds.totalPresent}/{ds.totalStudents}</div>
                  </div>
                </button>
              );
            })
          }
        </>}
      </>}
    </div>
  );
}

/* ═══ PARENT FEE MONTHS COMPONENT (proper component — hooks safe) ═══ */
function PFeeMonths({sFees}){
  const monthOrder=useMemo(()=>{
    const keys=[...new Set(sFees.map(fe=>`${fe.month} ${fe.year}`))];
    return keys.sort((a,b)=>{
      const [mA,yA]=a.split(" ");const [mB,yB]=b.split(" ");
      if(yB!==yA)return parseInt(yB)-parseInt(yA);
      return MONTHS.indexOf(mB)-MONTHS.indexOf(mA);
    });
  },[sFees]);
  const [xMo,setXMo]=useState(()=>monthOrder[0]||null);
  return(
    <>
      <div style={{background:C.card2,borderRadius:11,padding:"10px 14px",marginBottom:12,display:"flex",gap:16}}>
        <span style={{fontWeight:800,color:C.green,fontSize:13}}>✓ Paid ₹{sFees.filter(f=>f.paid).reduce((s,x)=>s+(x.amount||0),0)}</span>
        <span style={{fontWeight:800,color:C.red,fontSize:13}}>✗ Due ₹{sFees.filter(f=>!f.paid).reduce((s,x)=>s+(x.amount||0),0)}</span>
      </div>
      {sFees.length===0&&<div style={{color:C.muted,textAlign:"center",padding:"20px 0"}}>No fee records</div>}
      {monthOrder.map(mk=>{
        const mRecs=sFees.filter(fe=>`${fe.month} ${fe.year}`===mk);
        const mPaid=mRecs.filter(fe=>fe.paid).length;
        const isOpen=xMo===mk;
        return(
          <div key={mk} style={{marginBottom:8}}>
            <button onClick={()=>setXMo(isOpen?null:mk)}
              style={{width:"100%",background:isOpen?`${C.blue}18`:C.card,border:`1px solid ${isOpen?C.blue:C.border}`,borderRadius:isOpen?"12px 12px 0 0":12,padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:900,fontSize:14,color:C.white}}>{mk}</div>
                <div style={{display:"flex",gap:10,marginTop:3}}>
                  <span style={{fontSize:11,color:C.green,fontWeight:700}}>✓ ₹{mRecs.filter(fe=>fe.paid).reduce((s,x)=>s+(x.amount||0),0)}</span>
                  <span style={{fontSize:11,color:C.red,fontWeight:700}}>✗ ₹{mRecs.filter(fe=>!fe.paid).reduce((s,x)=>s+(x.amount||0),0)}</span>
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:900,color:mPaid===mRecs.length&&mRecs.length>0?C.green:C.muted}}>{mRecs.length>0?Math.round(mPaid/mRecs.length*100):0}%</div>
                <div style={{width:40,height:4,background:"#222",borderRadius:2,marginTop:4,overflow:"hidden",marginLeft:"auto"}}>
                  <div style={{width:`${mRecs.length>0?Math.round(mPaid/mRecs.length*100):0}%`,height:"100%",background:mPaid===mRecs.length&&mRecs.length>0?C.green:C.gold,borderRadius:2}}/>
                </div>
              </div>
              <span style={{color:C.muted,fontSize:13}}>{isOpen?"▲":"▼"}</span>
            </button>
            {isOpen&&(
              <div style={{background:C.card2,border:`1px solid ${C.blue}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"10px 12px"}}>
                {mRecs.map(f=>(
                  <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                    <div style={{fontSize:20}}>{f.paid?"💚":"💸"}</div>
                    <div style={{flex:1}}>
                      {f.note&&<div style={{fontSize:11,color:C.blue}}>📝 {f.note}</div>}
                      {f.paid&&f.paidDate&&<div style={{fontSize:11,color:C.green}}>Paid {fmtDate(f.paidDate)}</div>}
                      {!f.paid&&<div style={{fontSize:11,color:C.red}}>Pending</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:16,fontWeight:900,color:f.paid?C.green:C.red}}>₹{f.amount}</div>
                      <Pill label={f.paid?"Paid":"Due"} color={f.paid?C.green:C.red} small/>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
